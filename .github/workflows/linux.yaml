name: linux

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    branches: [ '*' ]

jobs:

  perl:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        perl-version:
        # - '5.10' Test::Deep wants 5.12
        - 5.12-buster
        - 5.14-buster
        - 5.16-buster
        - 5.18-buster
        - 5.20-buster
        - 5.22-buster
        - 5.24-buster
        - 5.26-buster
        - 5.28-buster
        - 5.30-bullseye
        - 5.32-bullseye
        - 5.34-bullseye
        - 5.36-bookworm
        - 5.38-bookworm
        - 5.40-bookworm
        - 5.42-bookworm
        - latest

    container:
      image: perl:${{ matrix.perl-version }}

    steps:
    - uses: actions/checkout@v7
    - run: env | sort
    - run: perl -V
    - name: Install deps
      run: >
        cpanm --quiet --notest
        Encode
        Test::Deep
        Test::More
        Test::YAML
    - name: Run Tests
      run: prove -lv test/


  cover:
    runs-on: ubuntu-latest
    container:
      image: perl:5.38

    steps:
    - uses: actions/checkout@v7
    - run: env | sort
    - run: perl -V

    - name: Install deps
      run: >
        cpanm --quiet --notest --skip-satisfied
        Devel::Cover::Report::Coveralls
        Encode
        Test::Deep
        Test::More
        Test::YAML

    - name: Run Tests
      run: |
        PERL5OPT=-MDevel::Cover=-coverage,statement,branch,condition,path,subroutine prove -l test/
        # cover -report coveralls
